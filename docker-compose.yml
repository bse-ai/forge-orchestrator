services:
  openclaw-gateway:
    build:
      context: .
      args:
        # Enable headless Chromium for browser automation inside container
        OPENCLAW_INSTALL_BROWSER: "${OPENCLAW_INSTALL_BROWSER:-1}"
    image: ${FORGE_ORCH_IMAGE:-forge-orchestrator:local}
    container_name: forge-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ${FORGE_ORCH_CONFIG_DIR:-./docker}:/home/node/.openclaw
      - ${FORGE_ORCH_WORKSPACE_DIR:-./workspace}:/home/node/.openclaw/workspace
      - ${FORGE_ORCH_CREDENTIALS_DIR:-./docker/credentials}:/home/node/.openclaw/credentials
      - ${FORGE_ORCH_DEVICES_DIR:-./docker/devices}:/home/node/.openclaw/devices
      - ${FORGE_ORCH_IDENTITY_DIR:-./docker/identity}:/home/node/.openclaw/identity
      - ./docker/canvas/voice.html:/app/dist/control-ui/voice.html:ro
      - ./docker/canvas/voice.js:/app/dist/control-ui/voice.js:ro
    ports:
      - "${FORGE_ORCH_GATEWAY_PORT:-18789}:18789"
      - "${FORGE_ORCH_BRIDGE_PORT:-18790}:18790"
      - "${FORGE_ORCH_GMAIL_PUBSUB_PORT:-8788}:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Chromium needs /dev/shm for shared memory; default 64MB is too small
    shm_size: "256m"
    init: true
    restart: always
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--bind",
        "${FORGE_ORCH_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${FORGE_ORCH_IMAGE:-forge-orchestrator:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${FORGE_ORCH_CONFIG_DIR:-./docker}:/home/node/.openclaw
      - ${FORGE_ORCH_WORKSPACE_DIR:-./workspace}:/home/node/.openclaw/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
    profiles:
      - cli
    depends_on:
      - openclaw-gateway
